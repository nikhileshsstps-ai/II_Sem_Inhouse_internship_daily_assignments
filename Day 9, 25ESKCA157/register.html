<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
    
    
        <h1>Registration Form</h1>

       <div>
        <label for="ID">ID </label>
        <input type="number" name="ID" id="ID" placeholder="ENTER YOUT ID">
       </div>
       <div>
        <label for="name">NAME</label>
        <input type="text" name="name" id="name" placeholder="ENTER YOUR NAME ">
       </div>
       <div>
        <label for="roll_no">ROLL_NO</label>
        <input type="text" name="roll_no" id="roll_no" placeholder="ENTER YOUR ROLL NO">
       </div>
       <div>
        <label for="branch">BRANCH</label>
        <input type="text" name="branch" id="branch" placeholder="ENTER YOUR BRANCH">
       </div>
       <div>
        <label for="phone_number">PHONE NUMBER</label>
        <input type="text" name="phone_number" id="phone_number" placeholder="ENTER YOUR PHONE NUMBER">
       </div>
       <div style="text-align: center; margin-top: 15px;">
            <button type="submit" value="SUBMIT" class="button"> SUBMIT </button>
        </div>

    

</body>
</html>
