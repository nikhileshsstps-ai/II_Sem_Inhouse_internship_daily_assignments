<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Cards</title>

    <link rel="stylesheet" href="bootstrap.min.css">
    <script src="bootstrap.js"></script>
</head>
<body class="bg-light">

    <div class="container py-5">
        <h2 class="text-center mb-4">Student Records</h2>

        <input type="text" id="search" class="form-control mb-4" placeholder="Search Student">

        <div id="container" class="row g-4"></div>
    </div>

    <script>
        const student = [
            { name: "Nikhilesh", branch: "cse", cgpa: 9 },
            { name: "Anas", branch: "cse", cgpa: 10 },
            { name: "Naitik", branch: "cse", cgpa: 6 },
            { name: "Mradul", branch: "cse", cgpa: 9 },
            { name: "Mudit", branch: "cse", cgpa: 6 },
            { name: "Nidhip", branch: "cse", cgpa: 8 },
            { name: "Kabra", branch: "cse", cgpa: 7 },
            { name: "Naman", branch: "cse", cgpa: 6 },
            { name: "Mudit", branch: "cse", cgpa: 8.9 },
            { name: "Mamta", branch: "cse", cgpa: 9 },
            { name: "Prachi", branch: "cse", cgpa: 9 }
        ];

        let html = "";

        for (let i = 0; i < student.length; i++) {
            html += `
                <div class="col-md-4">
                    <div class="card shadow h-100">
                        <div class="card-body">

                            <h4>${student[i].name}</h4>

                            <button class="btn btn-primary btn-sm mt-2 showBtn">
                                Show Details
                            </button>

                            <div class="details mt-3" style="display:none;">
                                <p><strong>Branch:</strong> ${student[i].branch}</p>
                                <p><strong>CGPA:</strong> ${student[i].cgpa}</p>
                            </div>

                        </div>
                    </div>
                </div>
            `;
        }

        document.getElementById("container").innerHTML = html;

        // Show/Hide Details
        const buttons = document.querySelectorAll(".showBtn");

        buttons.forEach(button => {
            button.addEventListener("click", function () {

                const details = this.nextElementSibling;

                if (details.style.display === "none") {
                    details.style.display = "block";
                    this.textContent = "Hide Details";
                } else {
                    details.style.display = "none";
                    this.textContent = "Show Details";
                }

            });
        });

        // Search Student
        document.getElementById("search").addEventListener("keyup", function () {

            let value = this.value.toLowerCase();

            document.querySelectorAll(".col-md-4").forEach(card => {

                let name = card.querySelector("h4").textContent.toLowerCase();

                if (name.includes(value)) {
                    card.style.display = "";
                } else {
                    card.style.display = "none";
                }

            });

        });
    </script>

</body>
</html>
